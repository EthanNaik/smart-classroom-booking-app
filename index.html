<!DOCTYPE html>
<html>
<head>
<title>Classroom Booking System</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)),
              url("images/img3.jpeg");
  background-size:cover;
  background-position:center;
  overflow:hidden;
  color:white;
}

body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
  background-size:50px 50px;
  animation: moveBg 20s linear infinite;
}

@keyframes moveBg{
  0%{ transform: translate(0,0); }
  100%{ transform: translate(-200px,-200px); }
}

.container{
  position:relative;
  background: rgba(255,255,255,0.1);
  padding:60px;
  border-radius:25px;
  box-shadow:0 0 40px rgba(0,0,0,0.5);
  text-align:center;
  animation: animated 1.5s ease-in-out;
}

@keyframes animated{
  from{ opacity:0; transform:translateY(30px);}
  to{ opacity:1; transform:translateY(0);}
}

h1{
  font-size:40px;
  margin-bottom:20px;
  letter-spacing:1px;
}

p{
  font-size:18px;
  margin-bottom:25px;
}
.marquee{
  width:100%;
  overflow:hidden;
  white-space:nowrap;
  margin-bottom:20px;
}

.marquee span{
  display:inline-block;
  padding-left:100%;
  animation: scroll 12s linear infinite;
  font-weight:bold;
  color:#ffd700;
}

@keyframes scroll{
  0%{ transform:translateX(0);}
  100%{ transform:translateX(-100%);}
}
button{
  padding:14px 30px;
  border:none;
  border-radius:12px;
  background: linear-gradient(45deg, #ffd700, #ffcc00);
  color:black;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

button:hover{
  transform: scale(1.1) rotate(1deg);
  box-shadow:0 10px 25px rgba(0,0,0,0.6);
}
.circle{
  position:absolute;
  border-radius:50%;
  background: rgba(255,255,255,0.1);
  animation: float 10s infinite ease-in-out;
}
.circle1{
  width:80px;
  height:80px;
  top:10%;
  left:15%;
}
.circle2{
  width:120px;
  height:120px;
  bottom:10%;
  right:20%;
}
.circle3{
  width:60px;
  height:60px;
  top:50%;
  left:80%;
}

@keyframes float{
  0%,100%{ transform:translateY(0);}
  50%{ transform:translateY(-30px);}
}
</style>
</head>
<body>
<div class="circle circle1"></div>
<div class="circle circle2"></div>
<div class="circle circle3"></div>
<div class="container">
  <h1>Smart Classroom Booking System</h1>

  <div class="marquee">
    <span>Welcome to NIT Warangal Smart Classroom Booking Portal </span>
  </div>

  <p>Book classrooms easily and manage schedules efficiently</p>

  <button onclick="gotologin()">Get Started</button>
</div>

<script>
function gotologin(){
  window.location.href="login.html";
}
</script>

</body>
</html>
