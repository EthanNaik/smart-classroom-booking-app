<!DOCTYPE html>
<html>

<head>
  <title>Student Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .sidebar {
      width: 250px;
      background: rgba(0, 0, 0, 0.7);
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .sidebar h2 {
      margin-bottom: 30px;
      text-align: center;
    }

    .menuitem {
      padding: 12px;
      margin: 10px 0;
      cursor: pointer;
      border-radius: 8px;
      transition: 0.3s;
    }

    .menuitem:hover {
      background: #667eea;
      transform: translateX(5px);
    }

    .active {
      background: #667eea;
    }

    .logout {
      padding: 12px;
      cursor: pointer;
      border-radius: 8px;
      background: #ef4444;
      text-align: center;
    }

    .logout:hover {
      background: #dc2626;
    }

    .main {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }

    .namebar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .username {
      background: rgba(255, 255, 255, 0.2);
      padding: 10px 18px;
      border-radius: 20px;
      font-weight: bold;
    }

    ul {
      list-style: none;
    }

    li {
      background: rgba(255, 255, 255, 0.1);
      margin-bottom: 15px;
      padding: 15px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      transition: 0.3s;
    }

    li:hover {
      transform: scale(1.03);
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <div>
      <h2>Student</h2>
      <div class="menuitem active">My Classes</div>
    </div>
    <div class="logout" onclick="logout()">Logout</div>
  </div>

  <div class="main">
    <div class="namebar">
      <h2>My Classes</h2>
      <div class="username" id="username">Hi, Loading...</div>
    </div>
    <ul id="list"></ul>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script>
    let section = "";
    let studentYear = 0;
    let branch = "";
    let studentName = "";

    async function init() {
      const { data: { session } } = await client.auth.getSession();
      if (!session) { window.location.href = "login.html"; return; }

      const { data: student, error } = await client
        .from("students")
        .select("name, branch, section, studentyear")
        .eq("id", session.user.id)
        .single();

      if (error || !student) { console.error(error); alert("Error fetching student info."); return; }

      studentName = student.name;
      section = student.section.trim();
      studentYear = parseInt(student.studentyear);
      branch = student.branch.trim();

      document.getElementById("username").innerText = "Hi, " + studentName;

      loadBookings();
    }

    async function loadBookings() {
      const list = document.getElementById("list");
      list.innerHTML = "<li>Loading...</li>";

      const { data, error } = await client
        .from("bookings")
        .select("*, teachers(name)")
        .eq("section", section)
        .eq("department", branch)
        .eq("studentyear", studentYear);

      if (error) {
        console.error("Supabase error:", error);
        list.innerHTML = "<li>Error loading bookings</li>";
        return;
      }

      list.innerHTML = "";

      if (!data || data.length === 0) {
        list.innerHTML = "<li>No bookings for your class</li>";
        return;
      }

      data.forEach(b => {
        const li = document.createElement("li");
        li.innerHTML = `
      <span>${b.classroom_id} | ${b.booking_date} | ${b.start_time.slice(0, 5)} - ${b.end_time.slice(0, 5)}</span>
      <span>Booked by: ${b.teachers ? b.teachers.name : 'Unknown'}</span>
    `;
        list.appendChild(li);
      });
    }

    async function logout() {
      await client.auth.signOut();
      window.location.href = "login.html";
    }

    init();
  </script>

</body>

</html>
